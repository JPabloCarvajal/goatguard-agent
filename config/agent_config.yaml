collector:
  host: "127.0.0.1"
  tcp_port: 9999
  udp_port: 9998

intervals:
  metrics_seconds: 5
  heartbeat_seconds: 30
  arp_scan_seconds: 60

capture:
  interface: "auto"

logging:
  level: "INFO"
  file: "goatguard_agent.log"

slicing:
  default_snap_len: 96
  rules:
    - ports: [53]
      snap_len: 300
    - ports: [80]
      snap_len: 300
    - ports: [443]
      snap_len: 300